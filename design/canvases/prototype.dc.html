<helmet>
<meta name="design_doc_mode" content="canvas">
<style>
  *{box-sizing:border-box}

  .cta2{height:54px;border-radius:15px;background:#EEF1FF;display:flex;align-items:center;justify-content:center;font:600 16px/1 system-ui;color:#4C6FFF;cursor:pointer}
  .h1{font:700 27px/1.15 -apple-system,sans-serif;letter-spacing:-.5px}
  .sub{font:400 15px/1.5 system-ui;color:#7A808E;margin-top:10px}
  .tt{font:700 18px/1 -apple-system,sans-serif;letter-spacing:-.3px}

  .sh{box-shadow:0 1px 2px rgba(20,24,40,.04),0 6px 18px -10px rgba(20,24,40,.12)}

  .tabs{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);box-shadow:0 -1px 0 #ECEDF1;padding:9px 22px 26px;display:flex;justify-content:space-between}

</style>
</helmet>

<div style="font-family:-apple-system,'SF Pro Display','SF Pro Text','Inter',system-ui,sans-serif;color:#141824;padding:52px 60px 90px">

  <div style="font:800 34px/1 -apple-system,sans-serif;letter-spacing:-1px;color:#4C6FFF">Кликабельные прототипы</div>
  <div style="font:500 14px/1.5 system-ui;color:#6B7280;max-width:720px;margin:10px 0 24px">Выберите флоу и тапайте по кнопкам, чтобы пройти его. Стрелка «назад» и «Сначала» — для навигации.</div>

  <!-- flow picker -->
  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px">
    <button onClick="{{ pickA }}" style="{{ tabAStyle }}">А · Онбординг специалиста</button>
    <button onClick="{{ pickB }}" style="{{ tabBStyle }}">Б · Заказчик: заказ → оценка</button>
    <button onClick="{{ pickC }}" style="{{ tabCStyle }}">В · Специалист: лента → выполнен</button>
    <button onClick="{{ pickD }}" style="{{ tabDStyle }}">Г · Баланс → пейволл → пополнение</button>
  </div>
  <div style="display:flex;align-items:center;gap:14px;max-width:520px;margin-bottom:30px">
    <div style="flex:1;height:6px;border-radius:3px;background:#E1E4EB;overflow:hidden"><div class="prog" style="width:{{ progPct }}"></div></div>
    <span style="font:600 12px/1 system-ui;color:#9AA0AD;white-space:nowrap">{{ stepLabel }}</span>
    <span onClick="{{ restart }}" style="font:600 13px/1 system-ui;color:#4C6FFF;cursor:pointer;white-space:nowrap">Сначала</span>
  </div>

  <div class="pf">
    <div class="sb"><span>9:41</span><span class="ico"><svg width="18" height="12" viewBox="0 0 18 12" fill="#141824"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg><svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="1" y="1" width="21" height="10" rx="3" stroke="#141824" stroke-opacity=".35" stroke-width="1.2"/><rect x="3" y="3" width="16" height="6" rx="1.5" fill="#141824"/></svg></span></div>
    <div style="flex:1;position:relative;overflow:hidden">{{ screen }}</div>
    <div class="home"></div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { flow: 'A', step: 0 };
  steps = { A: 8, B: 6, C: 5, D: 4 };
  labels = {
    A: ['Welcome','Номер','Код','Роль','Анкета','Верификация','Проверка','Готово'],
    B: ['Создание','Отклики','Приняли','Чат','Завершение','Оценка'],
    C: ['Лента','Карточка','Отклик','Принят','Выполнен'],
    D: ['Баланс 0 ₸','Пейволл','Пополнение','Готово'],
  };
  pick(f){ this.setState({ flow: f, step: 0 }); }
  next(){ this.setState(s => ({ step: Math.min(s.step + 1, this.steps[s.flow] - 1) })); }

  restart(){ this.setState(s => ({ step: 0 })); }

  el(tag, style, children){ return React.createElement(tag, typeof style === 'string' ? { style: this.css(style) } : style, children); }
  css(s){ const o={}; s.split(';').forEach(r=>{ const i=r.indexOf(':'); if(i<0)return; const k=r.slice(0,i).trim(); const v=r.slice(i+1).trim(); if(!k)return; const ck=k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase()); o[ck]=v; }); return o; }

  renderVals(){

    return {
      pickA: mk('A'), pickB: mk('B'), pickC: mk('C'), pickD: mk('D'),
      tabAStyle: tabStyle('A'), tabBStyle: tabStyle('B'), tabCStyle: tabStyle('C'), tabDStyle: tabStyle('D'),
      progPct: Math.round(((step+1)/total)*100) + '%',
      stepLabel: `${step+1} / ${total} · ${this.labels[flow][step]}`,

      screen: this.renderScreen(flow, step),

  }

  // ---- screen helpers ----
  scr(children){ return this.el('div','position:absolute;inset:0;display:flex;flex-direction:column;background:#fff', children); }

  ill(bg, inner){ return this.el('div',`width:118px;height:118px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:${bg}`, inner); }
  svg(d, stroke, extra){ return React.createElement('svg', { width: (extra&&extra.w)||24, height:(extra&&extra.h)||24, viewBox:'0 0 24 24', fill:(extra&&extra.fill)||'none', stroke: stroke||'#4C6FFF', strokeWidth:(extra&&extra.sw)||1.7, strokeLinecap:'round', strokeLinejoin:'round', dangerouslySetInnerHTML:{__html:d} }); }
  cta(label, onClick, variant){ const base = variant==='2'?'background:#EEF1FF;color:#4C6FFF;':'background:#4C6FFF;color:#fff;'; return this.el('div',{ onClick, style:this.css(`height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;font:600 16px/1 system-ui;cursor:pointer;${base}`) }, label); }
  footer(node){ return this.el('div','padding:0 24px 40px', node); }
  header(title, back){ return this.el('div','display:flex;align-items:center;justify-content:center;position:relative;padding:8px 24px 12px', [ back?this.el('div',{ key:'b', onClick:this.back.bind(this), style:this.css('position:absolute;left:24px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer') }, this.svg('<path d="M15 5l-7 7 7 7"/>','#141824',{sw:2})):null, this.el('div',{key:'t', style:this.css('font:700 18px/1 -apple-system,sans-serif;letter-spacing:-.3px')}, title) ]); }
  pill(text, kind){ const c={grey:'background:#F0F1F4;color:#6B7280',indigo:'background:#EEF1FF;color:#4C6FFF',amber:'background:#FBEFDD;color:#B45309',green:'background:#E7F6EC;color:#16A34A'}[kind||'indigo']; return this.el('span',`font:600 12px/1 system-ui;padding:7px 12px;border-radius:999px;display:inline-flex;${c}`, text); }
  card(children, pad){ return this.el('div',`background:#fff;border-radius:18px;padding:${pad||'15px 16px'};box-shadow:0 1px 2px rgba(20,24,40,.04),0 6px 18px -10px rgba(20,24,40,.12)`, children); }
  star(fill){ return React.createElement('svg',{width:15,height:15,viewBox:'0 0 24 24',fill:fill||'#E8981F',dangerouslySetInnerHTML:{__html:'<path d="m12 3 2.5 5.5 6 .5-4.5 4 1.4 6L12 16l-5.4 3 1.4-6-4.5-4 6-.5L12 3Z"/>'}}); }
  badge(){ return this.el('span','display:inline-flex;align-items:center;gap:6px;font:600 12px/1 system-ui;color:#4C6FFF;background:#EEF1FF;padding:7px 13px;border-radius:999px',['Дипломированный ', React.createElement('svg',{key:'s',width:14,height:14,viewBox:'0 0 24 24',fill:'#4C6FFF',dangerouslySetInnerHTML:{__html:'<circle cx="12" cy="12" r="10"/><path d="m8 12 3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'}})]); }

  renderScreen(flow, step){
    const N = this.next.bind(this);
    // ============ FLOW A ============
    if(flow==='A'){
      if(step===0) return this.scr([
        this.center([
          this.el('div','position:relative;width:180px;height:144px;margin-bottom:34px',[
            this.el('div','position:absolute;inset:0;border-radius:28px;background:linear-gradient(160deg,#F4F6FE,#E9F0FB);overflow:hidden'),
            this.el('div','position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:999px 999px 999px 5px;background:#4C6FFF;transform:rotate(-45deg);box-shadow:0 12px 22px -6px rgba(76,111,255,.6);display:flex;align-items:center;justify-content:center', this.el('div','width:16px;height:16px;border-radius:999px;background:#fff;transform:rotate(45deg)'))

        this.el('div','flex:1;padding:30px 24px 0',[

          this.el('div','font:400 15px/1.5 system-ui;color:#7A808E;margin-top:10px','Отправим SMS с кодом подтверждения'),
          this.el('div','margin-top:28px;height:58px;border-radius:13px;box-shadow:inset 0 0 0 1px #E4E6EC;display:flex;align-items:center;padding:0 16px;font:600 18px/1 -apple-system,sans-serif',[this.el('span','','+7'),this.el('div','width:1px;height:24px;background:#E4E6EC;margin:0 14px'),this.el('span','color:#141824','701 234-56-78')])
        ]),
        this.footer(this.cta('Получить код', N))

      if(step===2){ const box=(v,act)=>this.el('div',`flex:1;height:64px;border-radius:14px;background:#fff;box-shadow:inset 0 0 0 1.5px ${act?'#4C6FFF':'#E4E6EC'};display:flex;align-items:center;justify-content:center;font:700 26px/1 -apple-system,sans-serif`, v); return this.scr([
        this.el('div','padding:8px 24px 0', this.el('div',{onClick:this.back.bind(this),style:this.css('width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer')}, this.svg('<path d="M15 5l-7 7 7 7"/>','#141824',{sw:2}))),
        this.el('div','flex:1;padding:30px 24px 0',[
          this.el('div','font:700 27px/1.15 -apple-system,sans-serif;letter-spacing:-.5px','Введите код из SMS'),
          this.el('div','font:400 15px/1.5 system-ui;color:#7A808E;margin-top:10px','Отправили на +7 701 234-56-78'),
          this.el('div','display:flex;gap:12px;margin-top:30px',[box('5',true),box('2',true),box('4',true),box('8',true)]),
          this.el('div','text-align:center;font:500 12px/1 system-ui;color:#B9BEC9;margin-top:22px','Код действует 2 минуты')
        ]),
        this.footer(this.cta('Подтвердить', N))
      ]); }
      if(step===3){ const roleCard=(t,d,sel,icon)=>this.el('div',`display:flex;align-items:center;gap:16px;border-radius:18px;padding:20px;margin-top:${sel?'26px':'14px'};${sel?'background:#F4F6FF;box-shadow:inset 0 0 0 2px #4C6FFF':'background:#fff;box-shadow:inset 0 0 0 1px #E4E6EC'}`,[ this.el('div',`width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:none;${sel?'background:#fff':'background:#F2F3F6'}`, this.svg(icon, sel?'#4C6FFF':'#6B7280',{sw:1.8,w:26,h:26})), this.el('div','flex:1',[this.el('div','font:700 17px/1.2 -apple-system,sans-serif',t),this.el('div','font:500 13px/1.4 system-ui;color:#7A808E;margin-top:4px',d)]) ]); return this.scr([
        this.el('div','flex:1;padding:38px 24px 0',[
          this.el('div','font:700 27px/1.15 -apple-system,sans-serif;letter-spacing:-.5px','Кто вы?'),
          this.el('div','font:400 15px/1.5 system-ui;color:#7A808E;margin-top:10px','Вторую роль можно активировать позже'),
          roleCard('Я специалист','Откликаюсь на заказы',true,'<path d="M5 8h14l-1.5 11H6.5L5 8Z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/>'),
          roleCard('Я заказчик','Публикую задачи',false,'<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"/>')

      if(step===4){ const inp=(t,ic,chev)=>this.el('div','background:#fff;border-radius:13px;box-shadow:inset 0 0 0 1px #E4E6EC;display:flex;align-items:center;gap:12px;padding:0 15px;height:52px;margin-bottom:12px;font:500 15px/1 system-ui',[this.svg(ic,'#A2A8B4',{sw:1.8,w:20,h:20}),this.el('span','flex:1',t),chev?this.svg('<path d="M6 9l6 6 6-6"/>','#C3C8D2',{sw:2,w:18,h:18}):null]); return this.scr([

          inp('Электрика','<path d="M4 7l2-3h12l2 3M4 7h16M4 7v11a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V7"/>',true),
          this.el('div','display:flex;flex-wrap:wrap;gap:8px;margin-top:6px',[this.el('span','font:600 13px/1 system-ui;color:#4C6FFF;background:#EEF1FF;padding:9px 13px;border-radius:999px','Мелкий ремонт'),this.el('span','font:600 13px/1 system-ui;color:#4C6FFF;background:#EEF1FF;padding:9px 13px;border-radius:999px','Сборка мебели')])

      if(step===5){ const tile=(t,d)=>this.el('div','flex:1;background:#fff;border-radius:18px;box-shadow:inset 0 0 0 1px #E4E6EC;padding:22px 12px;text-align:center',[this.el('div','width:56px;height:56px;border-radius:16px;background:#EEF1FF;display:flex;align-items:center;justify-content:center;margin:0 auto', this.svg('<rect x="3" y="6" width="18" height="14" rx="3"/><circle cx="12" cy="13" r="3.5"/><path d="M8 6l1.5-2h5L16 6"/>','#4C6FFF',{w:26,h:26})),this.el('div','font:600 14px/1.2 system-ui;margin-top:14px',t),this.el('div','font:500 12px/1.35 system-ui;color:#9AA0AD;margin-top:5px',d)]); return this.scr([

          this.el('div','display:flex;gap:14px',[tile('Селфи','Ваше лицо'),tile('Селфи с документом','Удостоверение')]),
          this.el('div','font:500 13px/1 system-ui;color:#9AA0AD;margin-top:24px','Обычно проверка занимает до 1 часа')

      if(step===6) return this.scr([
        this.center([
          this.ill('linear-gradient(160deg,#DCE4FB,#C9D6F7)', this.el('div','width:88px;height:88px;border-radius:999px;background:#fff;display:flex;align-items:center;justify-content:center', this.svg('<circle cx="12" cy="12" r="9"/><path d="M12 7.5v5l3.5 2"/>','#4C6FFF',{w:50,h:50,sw:1.6}))),
          this.el('div','font:700 24px/1.3 -apple-system,sans-serif;margin-top:32px;letter-spacing:-.4px','Проверяем ваши данные'),

        this.header('Создание заказа', false),
        this.el('div','flex:1;padding:6px 24px 0',[
          this.el('div','display:flex;align-items:center;gap:13px;background:#fff;border-radius:14px;padding:15px 16px;box-shadow:inset 0 0 0 1px #E4E6EC',[this.el('div','width:40px;height:40px;border-radius:11px;background:#EEF1FF;display:flex;align-items:center;justify-content:center', this.svg('<path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/>','#4C6FFF',{w:21,h:21})),this.el('div','flex:1',[this.el('div','font:500 11px/1 system-ui;color:#9AA0AD','Категория'),this.el('div','font:600 15px/1.2 system-ui;margin-top:3px','Электрика')])]),
